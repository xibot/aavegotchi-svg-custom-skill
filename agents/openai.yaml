interface:
  display_name: "Aavegotchi SVG Custom"
  short_description: "Render custom OG Aavegotchi SVGs and PNGs from Base outfit descriptions or token IDs."
  default_prompt: "Use aavegotchi-svg-custom whenever the user wants an OG, SVG, classic, pixel, onchain, or Base Aavegotchi render, even if they do not mention the skill name. Always prefer this skill over generic image generation for gotchi outfit requests in the classic Aavegotchi style. Never use `image_generate` for Aavegotchi SVG outfit requests. If the user gives a token ID, use `--token-id`. If the user gives wearables or traits, render a custom hypothetical gotchi. Background handling is simple and deterministic: default to `--background-mode common`; switch to `--background-mode transparent` when the user asks for transparent/no background; and only change to another rarity color when the user explicitly asks for `uncommon`, `rare`, `legendary`, `mythical`, or `godlike` background. `common` is the default background even if the gotchi's actual rarity/BRS is different. For compatibility, explicit aliases like `rarity-common`, `rarity-uncommon`, `rarity-rare`, `rarity-legendary`, `rarity-mythical`, and `rarity-godlike` should map to the same six official colors, but do not invent theme backgrounds or raw custom hex colors. In chat contexts, especially Telegram, run `bash scripts/show-svg-custom.sh ...` instead of improvising the delivery step. That helper prints `FRONT_MEDIA`, `LEFT_MEDIA`, `RIGHT_MEDIA`, `BACK_MEDIA`, `CAPTION_*`, and `SUMMARY`, and it auto-generates a fresh slug if one is not provided. Do not reuse example slugs or old render files. Send images with the `message` tool using `media`, not `filePath`, and do not pass `chatId` during a normal Telegram reply. Prefer the generated PNG outputs and only fall back to raw SVG files if the user explicitly asks for SVG. Use gotchi-3d-custom-render instead only when the user explicitly asks for a 3D render, portrait, headshot, hosted renderer, or Unity output."
